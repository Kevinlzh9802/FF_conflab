all_clues:
  - head
  - shoulder
  - hip
  - foot

used_segs:
  # Filter by 3-digit <Cam><Vid><Seg> keys, e.g. "228". Empty = use all.

force_rerun: True
test: False
use_space: True
replace_df: True

analysis:
  spatial: False
  temporal: False
  cross_modal: False

plots:
  # BEV panel plots use spaceFeat + {clue}Res columns (no spaceCoords/pixelCoords needed).
  # main_GCFF_new.py detects ViTPose mode and calls plot_spacefeat_bev_panels_df instead
  # of the standard plot_panels_df.
  panels: True

params:
  stride: 0.4
  mdl: 0.6

paths:
  # ViTPose-specific input/output paths.  main_GCFF_new.py detects kp_vitpose
  # and uses kp_vitpose_finished instead of kp_finished for loading/saving,
  # so data_finished.pkl (original conflab) is never touched.
  kp_vitpose:          /tudelft.net/staff-umbrella/neon/zonghuan/data/conflab/GCFF/data_vitpose.pkl
  kp_vitpose_finished: /tudelft.net/staff-umbrella/neon/zonghuan/data/conflab/GCFF/data_vitpose_finished.pkl
  sp:                  /tudelft.net/staff-umbrella/neon/zonghuan/data/conflab/sp_merged.pkl
  panel_plots:         /tudelft.net/staff-umbrella/neon/zonghuan/data/conflab/GCFF/panel_plots_vitpose/
  log:                 /tudelft.net/staff-umbrella/neon/zonghuan/data/conflab/GCFF/logs/
  results:             /tudelft.net/staff-umbrella/neon/zonghuan/data/conflab/GCFF/results/
  # kp / kp_finished intentionally absent — not used in vitpose mode.
